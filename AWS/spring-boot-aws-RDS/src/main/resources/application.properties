spring.application.name=demo

# ========================
# AWS RDS PostgreSQL Configuration
# ========================
# TODO: Replace the below values with your actual AWS RDS PostgreSQL connection details
spring.datasource.url=TODO_FILL_YOUR_DB_URL
spring.datasource.username=TODO_FILL_YOUR_DB_USERNAME
spring.datasource.password=TODO_FILL_YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Configuration
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server Configuration
# ========================
server.port=8080
