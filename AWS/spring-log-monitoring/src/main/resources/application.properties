spring.application.name=log-monitoring
server.port=8080

# AWS CloudWatch Configuration
aws.cloudwatch.region=ap-south-1
aws.cloudwatch.enabled=true
aws.cloudwatch.log-group=spring-log-monitoring
aws.cloudwatch.log-stream=${spring.application.name}

# AWS Credentials (use environment variables or IAM roles in production)
# AWS_ACCESS_KEY_ID=your-access-key
# AWS_SECRET_ACCESS_KEY=your-secret-key

# Logging Configuration
logging.level.root=INFO
logging.level.com.tech.mathan.spring_log_monitoring=DEBUG
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# CloudWatch Appender Settings
awslogs.logger.name=ROOT
awslogs.enabled=true
