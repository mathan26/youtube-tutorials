version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - echo Java version
      - java -version
  build:
    commands:
      - echo Build started on `date`
      - cd AWS/Java_CI_CD_pipeline
      - mvn clean package
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - AWS/Java_CI_CD_pipeline/target/*.jar
  discard-paths: yes
